server:
  port: 8888 # Standard port for Spring Cloud Config servers

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          # This points the server to search your local file system for the config repository.
          # When running in Docker, the docker-compose.yml environment variable 
          # (SPRING_CLOUD_CONFIG_SERVER_GIT_URI) will override this value!
          uri: file://${user.home}/workspace/centralized-config-service/config-repo

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
