version: '3.8'

services:
  config-server:
    build: ./config-server # Path to the config-server project
    ports:
      - "8888:8888"
    volumes:
      # Mounts your local config-repo folder so the container can read it!
      - ./config-repo:/etc/config-repo
    environment:
      # Tells the Spring server exactly where the repo is inside the container
      - SPRING_CLOUD_CONFIG_SERVER_GIT_URI=file:///etc/config-repo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  inventory-service:
    build: ./inventory-service # Path to the inventory-service project
    ports:
      # Maps the host port to the container port defined for the dev profile
      - "8082:8082"
    environment:
      # Use this to switch between dev and prod profiles
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      # This overrides the bootstrap.yml to use Docker's internal networking
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    depends_on:
      config-server:
        # Ensures the client WAITS for the server to be fully healthy before starting
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/inventory/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
